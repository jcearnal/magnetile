<svg width="100%" viewBox="0 0 680 680" role="img">
<title>Magnetile icon square</title>
<desc>Square rounded icon with asymmetric crimson tiling zones, each with a window titlebar strip.</desc>

<!-- Outer dark border -->
<rect x="60" y="60" width="560" height="560" rx="80" fill="#0d0305"/>

<!-- Background -->
<rect x="68" y="68" width="544" height="544" rx="74" fill="#160408"/>

<!-- Zone panels -->
<rect x="104" y="104" width="164" height="472" rx="10" fill="#3d0c0c"/>
<rect x="276" y="104" width="300" height="220" rx="10" fill="#3d0c0c"/>
<rect x="276" y="332" width="140" height="244" rx="10" fill="#3d0c0c"/>
<rect x="424" y="332" width="152" height="244" rx="10" fill="#3d0c0c"/>

<!-- Titlebars -->
<rect x="104" y="104" width="164" height="28" rx="10" fill="#5a1010"/>
<rect x="104" y="118" width="164" height="14" fill="#5a1010"/>
<rect x="276" y="104" width="300" height="28" rx="10" fill="#5a1010"/>
<rect x="276" y="118" width="300" height="14" fill="#5a1010"/>
<rect x="276" y="332" width="140" height="28" rx="10" fill="#5a1010"/>
<rect x="276" y="346" width="140" height="14" fill="#5a1010"/>
<rect x="424" y="332" width="152" height="28" rx="10" fill="#5a1010"/>
<rect x="424" y="346" width="152" height="14" fill="#5a1010"/>

<!-- Titlebar close dot -->
<circle cx="122" cy="118" r="5" fill="#e82020"/>
<circle cx="292" cy="118" r="5" fill="#e82020"/>
<circle cx="292" cy="346" r="5" fill="#e82020"/>
<circle cx="440" cy="346" r="5" fill="#e82020"/>

<!-- Titlebar line detail -->
<line x1="134" y1="118" x2="252" y2="118" stroke="#7a2020" stroke-width="2" stroke-linecap="round"/>
<line x1="304" y1="118" x2="560" y2="118" stroke="#7a2020" stroke-width="2" stroke-linecap="round"/>
<line x1="304" y1="346" x2="400" y2="346" stroke="#7a2020" stroke-width="2" stroke-linecap="round"/>
<line x1="452" y1="346" x2="560" y2="346" stroke="#7a2020" stroke-width="2" stroke-linecap="round"/>

<!-- Zone borders -->
<rect x="104" y="104" width="164" height="472" rx="10" fill="none" stroke="#c01818" stroke-width="2"/>
<rect x="276" y="104" width="300" height="220" rx="10" fill="none" stroke="#c01818" stroke-width="2"/>
<rect x="276" y="332" width="140" height="244" rx="10" fill="none" stroke="#c01818" stroke-width="2"/>
<rect x="424" y="332" width="152" height="244" rx="10" fill="none" stroke="#c01818" stroke-width="2"/>

<!-- Shared edge lines -->
<line x1="276" y1="112" x2="276" y2="568" stroke="#e82020" stroke-width="3" stroke-linecap="round"/>
<line x1="284" y1="332" x2="568" y2="332" stroke="#e82020" stroke-width="3" stroke-linecap="round"/>
<line x1="424" y1="340" x2="424" y2="568" stroke="#e82020" stroke-width="3" stroke-linecap="round"/>

<!-- Outer border -->
<rect x="68" y="68" width="544" height="544" rx="74" fill="none" stroke="#e82020" stroke-width="4.5"/>
<rect x="82" y="82" width="516" height="516" rx="68" fill="none" stroke="#c01818" stroke-width="1.5" opacity="0.5"/>

</svg>
